<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Pit-Patch · Spring 2015 Collection</title>

</head>
<body>

          </svg>
        </div>
        <p class="loader__wordmark">Pit-Patch</p>
      </div>
    </section>

    <!-- ===================== COVER ===================== -->
    <section id="screen-cover" class="screen screen--cover" aria-label="Spring 2015 Collection">
      <div class="cover">
        <img class="cover__mark" src="assets/needle.svg" alt="Pit-Patch" width="44" height="44">
        <p class="cover__eyebrow">Pit-Patch Spring 2015 Collection</p>
        <div class="swipe-cue" id="enter-cue">
          <span class="swipe-cue__track" aria-hidden="true">
            <span class="swipe-cue__dot"></span>
          </span>
          <span class="swipe-cue__label">Swipe to begin</span>
        </div>
      </div>
    </section>

    <!-- ===================== BROWSER ===================== -->
    <section id="screen-browser" class="screen screen--browser" aria-label="The collection">

      <!-- disc layers sit BEHIND the burlap frame; only the hole reveals them -->
      <div class="porthole" id="porthole"></div>

      <!-- the constant burlap material, with a transparent porthole -->
      <img class="bg-frame" src="assets/frame.webp" alt="" aria-hidden="true">

      <!-- UI above everything -->
      <header class="topbar">
        <span class="topbar__brand">Pit-Patch</span>
        <button class="cart-btn" id="cart-btn" type="button" aria-label="Cart">
          Cart <span class="cart-btn__count" id="cart-count">0</span>
        </button>
      </header>

      <button class="nav nav--prev" id="nav-prev" type="button" aria-label="Previous">&#8249;</button>
      <button class="nav nav--next" id="nav-next" type="button" aria-label="Next">&#8250;</button>

      <div class="info-area" id="info-area">
        <div class="info" id="info">
          <h2 class="info__name" id="sw-name"></h2>
          <button class="add-btn" id="add-btn" type="button">Add to cart</button>
        </div>
        <div class="finale" id="finale">
          <p class="finale__copy">We don&#8217;t want to see you keep sweating. Maybe it&#8217;s time you gave your account executive a call.</p>
          <button class="finale__cta" type="button">Email now</button>
          <img class="finale__logo" src="assets/ms-logo.svg" alt="Microsoft">
        </div>
      </div>

      <div class="swipe-hint" id="swipe-hint" aria-hidden="true">
        <span class="swipe-hint__label">Keep swiping</span>
        <span class="swipe-hint__chevs">&#8250;&#8250;&#8250;</span>
      </div>

      <div class="counter"><span id="counter-cur">01</span> &thinsp;/&thinsp; <span id="counter-total">13</span></div>

    </section>

    <!-- ===================== CART DRAWER ===================== -->
    <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
      <div class="cart-overlay" id="cart-overlay"></div>
      <aside class="cart-panel" role="dialog" aria-modal="true" aria-label="Your bag">
        <header class="cart-head">
          <h2 class="cart-head__title">Your bag</h2>
          <button class="cart-close" id="cart-close" type="button" aria-label="Close">&times;</button>
        </header>
        <div class="cart-list" id="cart-list"></div>
        <footer class="cart-foot">
          <div class="cart-foot__row">
            <span>Total</span>
            <span id="cart-total-count">0 items</span>
          </div>
          <button class="cart-checkout" id="cart-checkout" type="button">Checkout</button>
        </footer>
      </aside>
    </div>

  </main>
  <div class="touch-cursor" id="touch-cursor" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
